# fly.toml — deploy with:  fly launch --now   (then:  fly deploy)
app = "lex-automata"
primary_region = "bos"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  LEX_COURT_SEED = "lex-automata-prod-court-seed-change-me"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  method = "GET"
  path = "/healthz"
  interval = "15s"
  timeout = "2s"
